name: Regenerate ws and json5 security lockfile

on:
  push:
    branches:
      - automation/cwco-ws-8.21.1-json5-2.2.3
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  regenerate-and-verify:
    if: ${{ !contains(github.event.head_commit.message || '', '[lockfile-regenerated]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: automation/cwco-ws-8.21.1-json5-2.2.3
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Regenerate lockfile with security overrides
        run: |
          npm install --global npm@8.19.4
          rm -rf node_modules
          npm install --package-lock-only --lockfile-version=2 --ignore-scripts
      - name: Verify patched transitive versions
        run: |
          node <<'NODE'
          const lock = require('./package-lock.json');
          const versions = name => Object.entries(lock.packages || {})
            .filter(([path]) => path.endsWith(`/node_modules/${name}`) || path === `node_modules/${name}`)
            .map(([, value]) => value.version);
          const ws = versions('ws');
          const json5 = versions('json5');
          console.log('ws versions:', ws.join(', '));
          console.log('json5 versions:', json5.join(', '));
          if (!ws.length || ws.some(v => v !== '8.21.1')) process.exit(1);
          if (!json5.length || json5.some(v => v !== '2.2.3')) process.exit(1);
          NODE
      - name: Verify clean install
        run: npm ci
      - name: Verify build
        run: npm run build
      - name: Verify tests
        run: npm test -- --runInBand
      - name: Commit validated security lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json package.json
          git rm .github/workflows/regenerate-ws-json5-lockfile.yml
          git commit -m "fix(deps): update ws and json5 security versions [lockfile-regenerated]"
          git push origin HEAD:automation/cwco-ws-8.21.1-json5-2.2.3
