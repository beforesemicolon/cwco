name: Regenerate braces security lockfile

on:
  push:
    branches:
      - automation/cwco-braces-3.0.3

permissions:
  contents: write

jobs:
  regenerate-and-verify:
    if: ${{ !contains(github.event.head_commit.message, '[lockfile-regenerated]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: automation/cwco-braces-3.0.3
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Update only braces in lockfile
        run: |
          npm install --global npm@8.19.4
          rm -rf node_modules
          npm update braces --package-lock-only --lockfile-version=2 --ignore-scripts
      - name: Verify vulnerable braces is removed
        run: |
          node <<'NODE'
          const lock = require('./package-lock.json');
          const versions = Object.entries(lock.packages || {})
            .filter(([path]) => path.endsWith('/braces'))
            .map(([, value]) => value.version);
          console.log('braces versions:', versions.join(', '));
          if (!versions.includes('3.0.3') || versions.includes('3.0.2')) process.exit(1);
          NODE
      - name: Verify clean install
        run: npm ci
      - name: Verify build
        run: npm run build
      - name: Verify tests
        run: npm test -- --runInBand
      - name: Commit validated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git rm .github/workflows/regenerate-braces-lockfile.yml
          git commit -m "fix(deps): update braces to 3.0.3 [lockfile-regenerated]"
          git push origin HEAD:automation/cwco-braces-3.0.3
